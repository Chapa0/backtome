plugins {
    id "com.android.application"
    // Plugin de Google Services para Firebase
    id 'com.google.gms.google-services'
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin" // Plugin de Flutter
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def pubspecFile = rootProject.file("../pubspec.yaml")
def pubspecVersion = null
if (pubspecFile.exists()) {
    def versionLine = pubspecFile.readLines().find { line ->
        line.trim().startsWith("version:")
    }
    if (versionLine != null) {
        pubspecVersion = versionLine.split(":", 2)[1].trim()
    }
}

def fallbackVersionName = localProperties.getProperty("flutter.versionName") ?: "0.0.1"
def fallbackVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = pubspecVersion?.split("\\+", 2)[0] ?: fallbackVersionName
def flutterVersionCode = pubspecVersion?.contains("+") ? pubspecVersion.split("\\+", 2)[1] : fallbackVersionCode

android {
    namespace = "com.example.flutter_backtome"
    compileSdkVersion 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.mario.backtome"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug // Configuración de firma para compilación de lanzamiento
        }
    }
}

flutter {
    source "../.."
}
